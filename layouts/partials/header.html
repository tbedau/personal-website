<header class="site-header">
    <div class="header-content">
        <div class="site-branding">
            <h1 class="site-title">
                <a href="{{ .Site.Home.Permalink }}">{{ .Site.Title }}</a>
            </h1>
            {{ with .Site.Params.subtitle }}
            <p class="site-subtitle">{{ . }}</p>
            {{ end }}
        </div>

        <nav class="nav-container">
            <div class="nav-wrapper">
                <ul class="main-nav">
                    {{ $currentPage := . }}
                    {{ range .Site.Menus.main }}
                    <li>
                        <a class="menu-link {{ if or ($currentPage.IsMenuCurrent "main" .) ($currentPage.HasMenuCurrent "main" .) }}active{{ end }}"
                        href="{{ .URL }}">
                         {{ .Name }}
                         </a>
                    </li>
                    {{ end }}
                </ul>
                <div class="nav-right">
                    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme">
                        <svg class="theme-toggle__sun" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            aria-hidden="true">
                            <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" />
                            <path
                                d="M12 5V3M12 21v-2M5 12H3m18 0h-2M6.4 6.4L5 5m12.6 12.6l1.4 1.4M6.4 17.6L5 19m12.6-12.6L19 5"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        </svg>
                        <svg class="theme-toggle__moon" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            aria-hidden="true">
                            <path
                                d="M21.53 15.93c-.16-.27-.61-.69-1.73-.49a8.46 8.46 0 01-1.88.13 8.409 8.409 0 01-5.91-2.82 8.068 8.068 0 01-1.44-8.66c.44-1.01.13-1.54-.09-1.76s-.77-.55-1.83-.11a10.318 10.318 0 00-6.32 10.21 10.475 10.475 0 007.04 8.99 10 10 0 002.89.55c.16.01.32.02.48.02a10.5 10.5 0 008.47-4.27c.67-.93.49-1.519.32-1.79z"
                                stroke="currentColor" stroke-width="2" />
                        </svg>
                    </button>
                </div>
            </div>
        </nav>
    </div>
</header>
