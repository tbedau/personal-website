title: Tillmann Bedau
baseURL: https://tillmannbedau.com/
languageCode: en-US
enableRobotsTXT: true

# Site parameters
params:
  sitename: Tillmann Bedau
  subtitle: "Pathology Resident | Turning messy workflows into reliable systems"
  description: Pathologist and tinkerer in Cologne. I build software on the side and write about the things I learn along the way.
  author:
    name: Tillmann Bedau
  twitter: https://x.com/tillmannbedau
  linkedin: https://www.linkedin.com/in/tillmann-bedau/
  email: till.bedau@gmail.com
  github: https://github.com/tbedau
  mainSections: [blog]
  dateFormat: January 2, 2006
  dateFormatShort: January 2
  themeColor: "#434648"

# Menu
menu:
  main:
    - pageRef: /
      name: Home
      url: /
      weight: 5
    - pageRef: projects
      name: Projects
      url: /projects/
      weight: 10
    - pageRef: blog
      name: Blog
      url: /blog/
      weight: 20
    - pageRef: about
      name: About
      url: /about/
      weight: 30

# Privacy
privacy:
  x:
    enableDNT: true

# Build settings
build:
  writeStats: true

# Pagination
pagination:
  pagerSize: 10

# Output formats
outputs:
  home:
    - HTML
    - RSS
  section:
    - HTML
    - RSS

# RSS settings
outputFormats:
  RSS:
    mediatype: "application/rss+xml"
    baseName: "feed"
